<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Mode — Coating Inspector Exam Prep</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg: #F4F1EC; --bg2: #EAE6DE; --navy: #1A2B3C; --amber: #C8760A; --amber2: #E8960A;
  --green: #1A6B3C; --red: #B03020; --border: #D4CFC6; --white: #FDFCFA;
  --muted: #6B7A8D; --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: var(--sans); color: var(--navy); min-height: 100vh; }

nav {
  background: var(--navy); padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.nav-logo { font-family: var(--mono); font-size: 0.72rem; color: #fff; letter-spacing: 1px; text-decoration: none; }
.nav-logo span { color: var(--amber2); }
.nav-mode { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px;
  background: rgba(200,118,10,0.2); color: var(--amber2); padding: 4px 12px; border-radius: 2px; }

/* EXAM TOPBAR */
#topbar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 12px 32px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.tb-stat { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
.tb-stat b { color: var(--navy); }
#timer-display {
  font-family: var(--mono); font-size: 1.1rem; font-weight: 500;
  color: var(--navy); min-width: 80px;
}
#timer-display.warning { color: var(--amber); }
#timer-display.critical { color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
#progress-wrap { flex: 1; height: 6px; background: var(--bg2); border-radius: 3px; min-width: 80px; }
#progress-bar { height: 6px; background: var(--amber); border-radius: 3px; width: 0%; transition: width 0.4s; }
#flagged-count { font-family: var(--mono); font-size: 0.7rem; color: var(--amber); }

/* Q NAV DOTS */
#q-nav-wrap {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 32px; overflow-x: auto;
}
#q-nav { display: flex; gap: 6px; min-width: max-content; }
.q-dot {
  width: 28px; height: 28px; border-radius: 4px; border: none;
  font-family: var(--mono); font-size: 0.65rem; cursor: pointer;
  background: var(--white); color: var(--muted); transition: all 0.15s;
  border: 1px solid var(--border);
}
.q-dot:hover { border-color: var(--amber); }
.q-dot.current { background: var(--amber); color: #fff; border-color: var(--amber); }
.q-dot.answered { background: var(--navy); color: #fff; border-color: var(--navy); }
.q-dot.flagged { background: #fff3cd; color: var(--amber); border-color: var(--amber); }
.q-dot.answered.flagged { background: #fef3c7; color: var(--amber); border-color: var(--amber); }

/* MAIN */
#main { max-width: 800px; margin: 0 auto; padding: 32px 24px 140px; }

/* QUESTION CARD */
.q-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 8px;
  padding: 24px 28px; display: none;
}
.q-card.active { display: block; }
.q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.q-domain { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 2px;
  background: rgba(200,118,10,0.08); color: var(--amber); padding: 2px 8px; border-radius: 2px; }
.q-num { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); margin-left: auto; }
.q-text { font-size: 0.95rem; line-height: 1.65; margin-bottom: 16px; font-weight: 500; }

/* FLAG + NOTE */
.q-actions { display: flex; gap: 10px; margin-bottom: 20px; }
.btn-flag {
  font-family: var(--mono); font-size: 0.68rem; letter-spacing: 1px;
  padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.btn-flag:hover { border-color: var(--amber); color: var(--amber); }
.btn-flag.flagged { background: #fff3cd; border-color: var(--amber); color: var(--amber); }
.btn-note {
  font-family: var(--mono); font-size: 0.68rem; letter-spacing: 1px;
  padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.btn-note:hover { border-color: var(--navy); color: var(--navy); }
textarea.note-field {
  width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px;
  font-family: var(--sans); font-size: 0.85rem; color: var(--navy);
  background: var(--bg); resize: vertical; min-height: 70px; margin-bottom: 16px;
  outline: none;
}
textarea.note-field:focus { border-color: var(--amber); }

.options { display: flex; flex-direction: column; gap: 8px; }
.opt {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 6px;
  cursor: pointer; transition: all 0.15s; background: var(--bg);
}
.opt:hover:not(.selected) { border-color: var(--amber); background: #fdf8f0; }
.opt.selected { border-color: var(--navy); background: #eef2f7; }
.opt-letter {
  font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
  min-width: 26px; height: 26px; border-radius: 4px;
  background: var(--bg2); display: flex; align-items: center; justify-content: center;
  color: var(--muted); flex-shrink: 0; margin-top: 1px;
}
.opt.selected .opt-letter { background: var(--navy); color: #fff; }
.opt-text { font-size: 0.875rem; line-height: 1.55; }

/* EXAM NAVIGATION */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--border);
  padding: 12px 32px; display: flex; align-items: center; gap: 12px;
  z-index: 100; box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
}
.nav-btn {
  font-family: var(--sans); font-size: 0.85rem; font-weight: 600;
  padding: 9px 20px; border-radius: 5px; cursor: pointer; border: none; transition: all 0.2s;
}
.btn-prev { background: var(--bg2); color: var(--navy); border: 1px solid var(--border); }
.btn-prev:hover { border-color: var(--navy); }
.btn-next { background: var(--navy); color: #fff; }
.btn-next:hover { background: #243447; }
.btn-submit { background: var(--amber); color: #fff; margin-left: auto; }
.btn-submit:hover { background: var(--amber2); }
#nav-status { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); margin: 0 auto; text-align: center; }

/* REVIEW PANEL */
#review-panel {
  display: none; max-width: 800px; margin: 32px auto; padding: 0 24px 140px;
}
#review-panel.show { display: block; }
.review-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 8px;
  padding: 24px 28px; margin-bottom: 12px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 16px;
}
.review-card:hover { border-color: var(--amber); }
.rc-num { font-family: var(--mono); font-size: 0.8rem; font-weight: 600; min-width: 32px; color: var(--muted); }
.rc-text { flex: 1; font-size: 0.875rem; line-height: 1.5; }
.rc-status { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 2px; flex-shrink: 0; }
.rc-answered { background: rgba(26,55,60,0.1); color: var(--navy); }
.rc-unanswered { background: rgba(176,48,32,0.1); color: var(--red); }
.rc-flagged { background: rgba(200,118,10,0.12); color: var(--amber); }

/* CALCULATOR */
#calc-toggle {
  position: fixed; bottom: 80px; right: 24px;
  background: var(--navy); color: #fff; border: none; border-radius: 50%;
  width: 48px; height: 48px; font-size: 1.2rem; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 200; transition: all 0.2s;
}
#calc-toggle:hover { background: var(--amber); }
#calculator {
  position: fixed; bottom: 140px; right: 24px;
  background: var(--navy); border-radius: 12px;
  padding: 16px; width: 220px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: none;
}
#calculator.show { display: block; }
#calc-display {
  background: #0d1f2e; color: #fff; font-family: var(--mono);
  font-size: 1.1rem; text-align: right; padding: 10px 14px;
  border-radius: 6px; margin-bottom: 10px; min-height: 44px; word-break: break-all;
}
.calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.calc-btn { padding: 10px 4px; border: none; border-radius: 5px; font-family: var(--mono); font-size: 0.8rem; cursor: pointer; background: rgba(255,255,255,0.1); color: #fff; transition: all 0.15s; }
.calc-btn:hover { background: rgba(255,255,255,0.2); }
.calc-btn.op { background: rgba(200,118,10,0.3); color: var(--amber2); }
.calc-btn.eq { background: var(--amber); color: #fff; }
.calc-btn.clr { background: rgba(176,48,32,0.3); color: #f87171; }

/* SCORE */
#score-panel { display: none; max-width: 680px; margin: 40px auto; padding: 0 24px 100px; }
#score-panel.show { display: block; }
.score-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 40px; text-align: center; margin-bottom: 24px; }
.score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto 24px; border: 8px solid; }
.score-pct { font-family: var(--mono); font-size: 2.2rem; font-weight: 500; }
.score-lbl { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 2px; color: var(--muted); }
.score-nums { display: flex; gap: 28px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.sn { text-align: center; }
.sn-val { font-family: var(--mono); font-size: 1.5rem; font-weight: 500; }
.sn-lbl { font-size: 0.68rem; color: var(--muted); letter-spacing: 1px; }
.result-msg { font-size: 0.875rem; color: var(--muted); line-height: 1.7; max-width: 440px; margin: 0 auto; }
.domain-results { text-align: left; }
.dr-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--bg2); }
.dr-row:last-child { border-bottom: none; }
.dr-name { font-size: 0.82rem; font-weight: 500; flex: 1; }
.dr-score { font-family: var(--mono); font-size: 0.78rem; min-width: 50px; text-align: right; }
.dr-bar { width: 80px; height: 5px; background: var(--bg2); border-radius: 2px; }
.dr-fill { height: 5px; border-radius: 2px; }
.btn-restart { background: var(--amber); color: #fff; border: none; padding: 13px 32px; border-radius: 5px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 24px; transition: all 0.2s; font-family: var(--sans); }
.btn-restart:hover { background: var(--amber2); }

@media (max-width: 600px) {
  nav, #topbar, #q-nav-wrap, #bottom-nav { padding-left: 16px; padding-right: 16px; }
  #main { padding: 20px 16px 140px; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">COATING<span>INSPECTOR</span>PREP</a>
  <span class="nav-mode">EXAM MODE</span>
</nav>

<div id="topbar">
  <div id="timer-display">2:40:00</div>
  <div class="tb-stat">Q: <b id="hdr-total">98</b></div>
  <div class="tb-stat">Done: <b id="hdr-done">0</b></div>
  <div id="flagged-count">🚩 0 flagged</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
</div>

<div id="q-nav-wrap"><div id="q-nav"></div></div>

<div id="main">
  <div id="quiz-area"></div>
  <div id="review-panel"></div>
  <div id="score-panel"></div>
</div>

<button id="calc-toggle" onclick="toggleCalc()" title="Calculator">🧮</button>
<div id="calculator">
  <div id="calc-display">0</div>
  <div class="calc-grid">
    <button class="calc-btn clr" onclick="calcInput('C')">C</button>
    <button class="calc-btn op" onclick="calcInput('(')">(</button>
    <button class="calc-btn op" onclick="calcInput(')')">)</button>
    <button class="calc-btn op" onclick="calcInput('/')">÷</button>
    <button class="calc-btn" onclick="calcInput('7')">7</button>
    <button class="calc-btn" onclick="calcInput('8')">8</button>
    <button class="calc-btn" onclick="calcInput('9')">9</button>
    <button class="calc-btn op" onclick="calcInput('*')">×</button>
    <button class="calc-btn" onclick="calcInput('4')">4</button>
    <button class="calc-btn" onclick="calcInput('5')">5</button>
    <button class="calc-btn" onclick="calcInput('6')">6</button>
    <button class="calc-btn op" onclick="calcInput('-')">−</button>
    <button class="calc-btn" onclick="calcInput('1')">1</button>
    <button class="calc-btn" onclick="calcInput('2')">2</button>
    <button class="calc-btn" onclick="calcInput('3')">3</button>
    <button class="calc-btn op" onclick="calcInput('+')">+</button>
    <button class="calc-btn" onclick="calcInput('0')" style="grid-column:span 2">0</button>
    <button class="calc-btn" onclick="calcInput('.')">.</button>
    <button class="calc-btn eq" onclick="calcInput('=')">=</button>
  </div>
</div>

<div id="bottom-nav">
  <button class="nav-btn btn-prev" id="btn-prev" onclick="goTo(currentQ-1)">← PREV</button>
  <div id="nav-status">Q 1 / 98</div>
  <button class="nav-btn btn-next" id="btn-next" onclick="goTo(currentQ+1)">NEXT →</button>
  <button class="nav-btn btn-submit" onclick="showReview()">Review & Submit →</button>
</div>

<script>
const EXAM_Q = [
{domain:"Surface Preparation",q:"The selection of abrasive media on a project is typically dependent on which primary criterion?",opts:[{l:"A",t:"Local availability only"},{l:"B",t:"Type of surface to be prepared"},{l:"C",t:"Inspector's preference"},{l:"D",t:"Abrasive cost alone"}],ans:"B",exp:""},
{domain:"Surface Preparation",q:"At what stages of a coating project could pre-cleaning be required?",opts:[{l:"A",t:"Only when specified by the inspector"},{l:"B",t:"Before surface preparation AND after surface preparation, before coating application"},{l:"C",t:"Before surface preparation only"},{l:"D",t:"After surface preparation, before coating application only"}],ans:"B",exp:""},
{domain:"Surface Preparation",q:"NACE No.4 / SSPC-SP 7 is known as:",opts:[{l:"A",t:"Near-White Blast Cleaning"},{l:"B",t:"Industrial Blast Cleaning"},{l:"C",t:"Brush-Off Blast Cleaning"},{l:"D",t:"Commercial Blast Cleaning"}],ans:"C",exp:""},
{domain:"Surface Preparation",q:"Which of the following defines a \'commercially\' blast-cleaned surface?",opts:[{l:"A",t:"NACE No.3 / SSPC-SP 6"},{l:"B",t:"ISO St 2"},{l:"C",t:"ISO Sa 2½"},{l:"D",t:"NACE No.2 / SSPC-SP 10"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"All dry abrasive blast cleaning standards prohibit which of the following from remaining on the surface?",opts:[{l:"A",t:"Surface profile"},{l:"B",t:"Tightly adherent mill scale"},{l:"C",t:"Staining"},{l:"D",t:"Loose visible contaminants"}],ans:"D",exp:""},
{domain:"Surface Preparation",q:"Which ambient condition may increase the potential for \'rust back\' of blasted steel?",opts:[{l:"A",t:"High air and surface temperatures"},{l:"B",t:"Low wind speed"},{l:"C",t:"Dew point 3°C (5°F) below surface temperature"},{l:"D",t:"High relative humidity ≥ 85%"}],ans:"D",exp:""},
{domain:"Surface Preparation",q:"Which option best describes the primary function(s) of surface preparation?",opts:[{l:"A",t:"To remove surface contaminants that can promote premature coating failure"},{l:"B",t:"To provide decorative texture to the surface"},{l:"C",t:"To test coating adhesion before application"},{l:"D",t:"To determine the type of coating to apply based on the surface condition"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"Which power tool cleaning standard results in a BARE METAL appearance AND requires a minimum surface profile of 25 µm (1 mil)?",opts:[{l:"A",t:"SSPC-SP 11"},{l:"B",t:"SSPC-SP 15"},{l:"C",t:"SSPC-SP 2"},{l:"D",t:"SSPC-SP 3"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"Which SSPC-VIS 1 rust grade defines a surface covered in mill scale and rust but WITHOUT pitting?",opts:[{l:"A",t:"Grade B"},{l:"B",t:"Grade C"},{l:"C",t:"Grade A"},{l:"D",t:"Grade D"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"WJ-3 (Thorough Cleaning) allows tightly adherent material and staining of up to:",opts:[{l:"A",t:"50% per unit area"},{l:"B",t:"33% per unit area"},{l:"C",t:"5% per unit area"},{l:"D",t:"10% per unit area"}],ans:"B",exp:""},
{domain:"Surface Preparation",q:"SSPC-SP 2 (Hand Tool Cleaning) results in which of the following end conditions?",opts:[{l:"A",t:"White metal appearance with no staining"},{l:"B",t:"Commercial-grade cleanliness with 33% maximum staining"},{l:"C",t:"All loose rust, mill scale, and paint removed; tightly adherent material may remain"},{l:"D",t:"Bare metal appearance with minimum 25 µm profile"}],ans:"C",exp:""},
{domain:"Surface Preparation",q:"What property of an abrasive can help determine how quickly a surface profile is achieved?",opts:[{l:"A",t:"Color"},{l:"B",t:"Country of origin"},{l:"C",t:"Recyclability"},{l:"D",t:"Size"}],ans:"D",exp:""},
{domain:"Surface Preparation",q:"In SSPC-VIS 1, which Rust Grade defines a surface that is ENTIRELY covered by mill scale with virtually no rust?",opts:[{l:"A",t:"Rust Grade B"},{l:"B",t:"Rust Grade D"},{l:"C",t:"Rust Grade A"},{l:"D",t:"Rust Grade C"}],ans:"C",exp:""},
{domain:"Surface Preparation",q:"SSPC-SP 10 / NACE No.2 (Near-White) allows a maximum of how much staining per unit area?",opts:[{l:"A",t:"5% maximum"},{l:"B",t:"10% maximum"},{l:"C",t:"0% — no staining allowed"},{l:"D",t:"33% maximum"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"SSPC-SP 1 solvent cleaning typically uses which type of cleaning method?",opts:[{l:"A",t:"Mechanical abrasion with wire brushes"},{l:"B",t:"Waterjet at high pressure"},{l:"C",t:"Steam cleaning only"},{l:"D",t:"Wiping, dipping, or spraying with solvents"}],ans:"D",exp:""},
{domain:"Surface Preparation",q:"Which visual reference guide is used to assess the initial rust grade of steel BEFORE abrasive blasting?",opts:[{l:"A",t:"SSPC-VIS 1"},{l:"B",t:"SSPC-VIS 3"},{l:"C",t:"ISO 8502"},{l:"D",t:"SSPC-VIS 4 / NACE VIS 7"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"NACE No.2 / SSPC-SP 10 (Near-White Blast) allows a maximum staining of:",opts:[{l:"A",t:"5% per unit area"},{l:"B",t:"0%"},{l:"C",t:"10% per unit area"},{l:"D",t:"33% per unit area"}],ans:"A",exp:""},
{domain:"Surface Preparation",q:"How should the surface profile be defined in a well-written specification?",opts:[{l:"A",t:"As an exact target measurement"},{l:"B",t:"As a range — both minimum and maximum depth"},{l:"C",t:"Specifying only the minimum depth required"},{l:"D",t:"Specifying only the maximum depth allowed"}],ans:"B",exp:""},
{domain:"Surface Preparation",q:"What additional assessment is ALWAYS required after waterjetting or wet abrasive blasting that is NOT required after dry blasting?",opts:[{l:"A",t:"Holiday detection"},{l:"B",t:"Surface profile measurement"},{l:"C",t:"Flash rust assessment"},{l:"D",t:"Soluble salt testing"}],ans:"C",exp:""},
{domain:"Surface Preparation",q:"What functions can hand tools perform in the surface preparation process?",opts:[{l:"A",t:"Removing tightly adherent mill scale"},{l:"B",t:"Creating a consistent anchor profile"},{l:"C",t:"Removing loosely adherent material"},{l:"D",t:"Removing embedded soluble salts"}],ans:"C",exp:""},
{domain:"Coatings",q:"What is the risk of applying an alkyd coating over fresh (green) concrete?",opts:[{l:"A",t:"The concrete is too smooth for adhesion"},{l:"B",t:"The coating cures too fast on concrete"},{l:"C",t:"Saponification — the alkali in concrete attacks the alkyd binder"},{l:"D",t:"The concrete absorbs too much coating"}],ans:"C",exp:""},
{domain:"Coatings",q:"Which coating system layer is applied directly to the substrate and provides primary adhesion and corrosion protection?",opts:[{l:"A",t:"Sealer"},{l:"B",t:"Topcoat"},{l:"C",t:"Intermediate coat"},{l:"D",t:"Primer"}],ans:"D",exp:""},
{domain:"Coatings",q:"A coating has SBV = 75% and is thinned by 20%. What is the Adjusted SBV?",opts:[{l:"A",t:"0.625"},{l:"B",t:"0.90"},{l:"C",t:"0.75"},{l:"D",t:"0.55"}],ans:"A",exp:""},
{domain:"Coatings",q:"What is the typical acceptable chloride contamination limit commonly referenced for immersion/offshore coating systems?",opts:[{l:"A",t:"Less than 500 mg/m²"},{l:"B",t:"Less than 50–80 mg/m² (varies by spec — often 20–50 mg/m² for severe service)"},{l:"C",t:"Zero — no chlorides whatsoever are acceptable"},{l:"D",t:"Less than 200 mg/m²"}],ans:"B",exp:""},
{domain:"Coatings",q:"Polyurea coatings are characterized by which of the following properties?",opts:[{l:"A",t:"Water-based, low VOC, brush-applied"},{l:"B",t:"Fast-reacting plural component system, applied with heated airless equipment"},{l:"C",t:"Alkyd-based, air-drying by oxidation"},{l:"D",t:"Very slow cure, single-component system"}],ans:"B",exp:""},
{domain:"Coatings",q:"Alkyds are NOT recommended for application over which type of surface?",opts:[{l:"A",t:"Rusted steel with tightly adherent rust"},{l:"B",t:"Alkaline surfaces such as concrete or galvanized steel"},{l:"C",t:"Clean blast-cleaned steel"},{l:"D",t:"Previously primed steel"}],ans:"B",exp:""},
{domain:"Coatings",q:"What is the difference between 'drying' and 'curing' of a coating?",opts:[{l:"A",t:"Curing only applies to single-component coatings"},{l:"B",t:"Drying and curing are the same process with different names"},{l:"C",t:"Drying = loss of solvent making the film touch-dry; curing = full development of film properties, often by chemical reaction"},{l:"D",t:"Drying applies only to waterborne coatings; curing applies only to solvent-based"}],ans:"C",exp:""},

{domain:"Teamwork",q:"During a coating project, the applicator informs the inspector that the specified surface preparation standard cannot be achieved in certain confined areas due to equipment access limitations. The inspector's FIRST step should be to:",opts:[{l:"A",t:"Approve a lower surface preparation standard immediately to keep the project on schedule"},{l:"B",t:"Document the limitation and escalate to the appropriate party per the project chain of command for a formal disposition"},{l:"C",t:"Allow the applicator to use whatever method is feasible and make no record of the deviation"},{l:"D",t:"Stop all work on the entire project until the access issue is resolved"}],ans:"B",exp:"The inspector's role is not to unilaterally approve deviations from the specification. Access limitations must be documented and referred up the chain of command — typically to the owner's representative or engineer — for a formal decision. Unilateral approval or ignoring the deviation are both outside the inspector's authority."},

// Shuffle questions
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const QUESTIONS = shuffleArray(EXAM_Q);
const TOTAL = QUESTIONS.length;
const answers = {};   // index -> letter
const flags = new Set();
const notes = {};     // index -> string
const noteVisible = new Set();
let currentQ = 0;

// TIMER: 160 minutes
let timeLeft = 160 * 60;
let timerInterval = null;

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); showReview(); }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(timeLeft / 3600);
  const m = Math.floor((timeLeft % 3600) / 60);
  const s = timeLeft % 60;
  const display = document.getElementById('timer-display');
  const str = h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  display.textContent = str;
  display.className = timeLeft < 300 ? 'critical' : timeLeft < 1200 ? 'warning' : '';
}

function buildQNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-dot' + (i === currentQ ? ' current' : '') +
      (answers[i] !== undefined ? ' answered' : '') +
      (flags.has(i) ? ' flagged' : '');
    btn.textContent = i+1;
    btn.onclick = () => goTo(i);
    nav.appendChild(btn);
  });
}

function renderQuestion(i) {
  const area = document.getElementById('quiz-area');
  document.getElementById('review-panel').classList.remove('show');
  document.getElementById('score-panel').classList.remove('show');
  area.style.display = '';

  const q = QUESTIONS[i];
  const chosen = answers[i];
  const isFlagged = flags.has(i);
  const noteVis = noteVisible.has(i);

  let html = `<div class="q-card active" id="qcard">
    <div class="q-meta">
      <span class="q-domain">${q.domain.toUpperCase()}</span>
      <span class="q-num">Q ${i+1} / ${TOTAL}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="q-actions">
      <button class="btn-flag ${isFlagged?'flagged':''}" onclick="toggleFlag(${i})">
        ${isFlagged ? '🚩 Flagged' : '🏳 Flag for review'}
      </button>
      <button class="btn-note" onclick="toggleNote(${i})">📝 Note</button>
    </div>
    ${noteVis ? `<textarea class="note-field" id="note-${i}" placeholder="Your note for this question..." onchange="saveNote(${i}, this.value)">${notes[i]||''}</textarea>` : ''}
    <div class="options">`;

  q.opts.forEach(opt => {
    const sel = chosen === opt.l ? ' selected' : '';
    html += `<div class="opt${sel}" onclick="choose(${i},'${opt.l}')">
      <div class="opt-letter">${opt.l}</div>
      <div class="opt-text">${opt.t}</div>
    </div>`;
  });

  html += '</div></div>';
  area.innerHTML = html;
  updateMeta();
  buildQNav();
  updateNavBtns();
}

function goTo(i) {
  if (i < 0 || i >= TOTAL) return;
  currentQ = i;
  renderQuestion(i);
  window.scrollTo(0,0);
}

function choose(i, letter) {
  answers[i] = letter;
  renderQuestion(i);
}

function toggleFlag(i) {
  if (flags.has(i)) flags.delete(i); else flags.add(i);
  renderQuestion(i);
}

function toggleNote(i) {
  if (noteVisible.has(i)) noteVisible.delete(i); else noteVisible.add(i);
  renderQuestion(i);
}

function saveNote(i, val) { notes[i] = val; }

function updateNavBtns() {
  document.getElementById('btn-prev').disabled = currentQ === 0;
  document.getElementById('btn-next').disabled = currentQ === TOTAL-1;
  document.getElementById('nav-status').textContent = `Q ${currentQ+1} / ${TOTAL}`;
}

function updateMeta() {
  const done = Object.keys(answers).length;
  document.getElementById('hdr-done').textContent = done;
  document.getElementById('flagged-count').textContent = `🚩 ${flags.size} flagged`;
  document.getElementById('progress-bar').style.width = (done/TOTAL*100)+'%';
}

function showReview() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('score-panel').classList.remove('show');
  const panel = document.getElementById('review-panel');
  const done = Object.keys(answers).length;
  const unanswered = TOTAL - done;

  let html = `<div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:28px 32px;margin-bottom:20px;">
    <h2 style="font-size:1.1rem;margin-bottom:8px;">Review your answers</h2>
    <p style="color:var(--muted);font-size:0.875rem;margin-bottom:20px;">
      ${done} answered · ${unanswered} unanswered · ${flags.size} flagged. Click any question to return to it.
    </p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
      <button onclick="filterReview('all')" style="font-family:var(--mono);font-size:0.68rem;padding:6px 14px;border-radius:3px;border:1px solid var(--border);background:var(--navy);color:#fff;cursor:pointer;">ALL (${TOTAL})</button>
      <button onclick="filterReview('flagged')" style="font-family:var(--mono);font-size:0.68rem;padding:6px 14px;border-radius:3px;border:1px solid var(--amber);background:#fff3cd;color:var(--amber);cursor:pointer;">FLAGGED (${flags.size})</button>
      <button onclick="filterReview('unanswered')" style="font-family:var(--mono);font-size:0.68rem;padding:6px 14px;border-radius:3px;border:1px solid var(--red);background:#fde8e5;color:var(--red);cursor:pointer;">UNANSWERED (${unanswered})</button>
    </div>
  </div>`;

  QUESTIONS.forEach((q, i) => {
    const isAnswered = answers[i] !== undefined;
    const isFlagged = flags.has(i);
    let status = isAnswered ? 'ANSWERED' : 'UNANSWERED';
    let statusClass = isAnswered ? 'rc-answered' : 'rc-unanswered';
    if (isFlagged) { status = '🚩 FLAGGED'; statusClass = 'rc-flagged'; }
    html += `<div class="review-card" data-answered="${isAnswered}" data-flagged="${isFlagged}" onclick="goTo(${i})">
      <div class="rc-num">${i+1}</div>
      <div class="rc-text">${q.q.slice(0,90)}${q.q.length>90?'…':''}</div>
      <div class="rc-status ${statusClass}">${status}</div>
    </div>`;
  });

  html += `<div style="text-align:center;margin-top:32px;padding:24px;background:var(--white);border:1px solid var(--border);border-radius:8px;">
    <p style="color:var(--muted);font-size:0.875rem;margin-bottom:20px;">Ready to submit? Your score will be revealed after submission.</p>
    <button onclick="submitExam()" style="background:var(--green);color:#fff;border:none;padding:14px 40px;border-radius:5px;font-size:1rem;font-weight:600;cursor:pointer;font-family:var(--sans);">Submit Exam →</button>
  </div>`;

  panel.innerHTML = html;
  panel.classList.add('show');
  window.scrollTo(0,0);

  // Update bottom nav for review mode
  document.getElementById('bottom-nav').innerHTML = `
    <button class="nav-btn btn-prev" onclick="goTo(currentQ)">← Back to Questions</button>
    <div id="nav-status">REVIEW MODE</div>
    <button class="nav-btn btn-submit" onclick="submitExam()">Submit Exam →</button>`;
}

function filterReview(type) {
  document.querySelectorAll('.review-card').forEach(card => {
    const answered = card.dataset.answered === 'true';
    const flagged = card.dataset.flagged === 'true';
    if (type === 'all') card.style.display = '';
    else if (type === 'flagged') card.style.display = flagged ? '' : 'none';
    else if (type === 'unanswered') card.style.display = !answered ? '' : 'none';
  });
}

function submitExam() {
  document.getElementById('review-panel').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'none';
  const panel = document.getElementById('score-panel');
  const total = TOTAL;
  const done = Object.keys(answers).length;
  const cor = QUESTIONS.filter((q,i) => answers[i] === q.ans).length;
  const pct = done > 0 ? Math.round(cor/total*100) : 0;
  const col = pct >= 80 ? '#1A6B3C' : pct >= 60 ? '#C8760A' : '#B03020';

  const domains = [...new Set(QUESTIONS.map(q => q.domain))];
  let drHtml = '';
  domains.forEach(d => {
    const dqs = QUESTIONS.map((q,i) => ({q,i})).filter(({q}) => q.domain === d);
    const dCor = dqs.filter(({q,i}) => answers[i] === q.ans).length;
    const dDone = dqs.filter(({i}) => answers[i] !== undefined).length;
    const dp = dDone > 0 ? Math.round(dCor/dDone*100) : 0;
    const bc = dp >= 70 ? '#1A6B3C' : dp >= 50 ? '#C8760A' : '#B03020';
    drHtml += `<div class="dr-row">
      <div class="dr-name">${d}</div>
      <div class="dr-score" style="color:${bc}">${dCor}/${dDone}</div>
      <div class="dr-bar"><div class="dr-fill" style="width:${dp}%;background:${bc}"></div></div>
    </div>`;
  });

  const msg = pct >= 80 ? 'Excellent. You are well prepared across all domains.'
    : pct >= 65 ? 'Good performance. Focus additional study on your lower-scoring domains before the exam.'
    : pct >= 50 ? 'More preparation needed. Review your weakest domains carefully.'
    : 'Significant preparation required. Work through Study Mode systematically before retrying.';

  panel.innerHTML = `
    <div class="score-card">
      <h2 style="font-size:0.8rem;font-family:var(--mono);letter-spacing:3px;color:var(--muted);margin-bottom:24px;">EXAM RESULTS</h2>
      <div class="score-circle" style="border-color:${col}">
        <div class="score-pct" style="color:${col}">${pct}%</div>
        <div class="score-lbl">FINAL SCORE</div>
      </div>
      <div class="score-nums">
        <div class="sn"><div class="sn-val">${total}</div><div class="sn-lbl">TOTAL Q</div></div>
        <div class="sn"><div class="sn-val" style="color:var(--green)">${cor}</div><div class="sn-lbl">CORRECT</div></div>
        <div class="sn"><div class="sn-val" style="color:var(--red)">${done-cor}</div><div class="sn-lbl">WRONG</div></div>
        <div class="sn"><div class="sn-val" style="color:var(--muted)">${total-done}</div><div class="sn-lbl">SKIPPED</div></div>
      </div>
      <p class="result-msg">${msg}</p>
      <button class="btn-restart" onclick="location.reload()">Retake Exam</button>
    </div>
    <div class="score-card domain-results">
      <h3 style="font-size:0.85rem;letter-spacing:2px;font-family:var(--mono);color:var(--muted);margin-bottom:16px;">DOMAIN BREAKDOWN</h3>
      ${drHtml}
    </div>`;

  panel.classList.add('show');
  document.getElementById('bottom-nav').style.display = 'none';
  window.scrollTo(0,0);
}

// CALCULATOR
let calcStr = '';
function toggleCalc() { document.getElementById('calculator').classList.toggle('show'); }
function calcInput(v) {
  if (v==='C') { calcStr=''; document.getElementById('calc-display').textContent='0'; return; }
  if (v==='=') {
    try {
      const r = Function('"use strict"; return ('+calcStr+')')();
      calcStr = String(Math.round(r*1000000)/1000000);
      document.getElementById('calc-display').textContent = calcStr;
    } catch { document.getElementById('calc-display').textContent='Error'; calcStr=''; }
    return;
  }
  calcStr += v;
  document.getElementById('calc-display').textContent = calcStr;
}

// Access check
if (sessionStorage.getItem('cip_access') !== 'true') {
  window.location.href = '/access?product=exam';
}

// Init
buildQNav();
renderQuestion(0);
startTimer();
</script>
</body>
</html>
